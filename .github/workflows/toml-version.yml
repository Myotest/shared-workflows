name: Check version in TOML file against TAG version

on:
  workflow_call:
    inputs:
      version:
        description: "The TAG version string for this release"
        required: true
        type: string
      toml_file:
        description: "The path and name of the *.toml file"
        required: true
        type: string

jobs:
  toml-version:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/check-version
        with:
          version: ${{ inputs.version }}
          file: ${{ inputs.toml_file }}
          extract_cmd: "head -n 10 \"$FILE\" | grep version -m 1 | sed 's/\"/ /g' | awk '{print $3}'"
          label: TOML
